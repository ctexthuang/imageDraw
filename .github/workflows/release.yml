name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from commits
        id: release-notes
        shell: bash
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          target_commit="$(git rev-list -n 1 "$tag")"
          previous_tag=""
          if git rev-parse "${target_commit}^" >/dev/null 2>&1; then
            previous_tag="$(
              git describe --tags --abbrev=0 \
                --match 'v[0-9]*.[0-9]*.[0-9]*' \
                --match '[0-9]*.[0-9]*.[0-9]*' \
                "${target_commit}^" 2>/dev/null || true
            )"
          fi
          notes_file="$RUNNER_TEMP/release-notes.md"

          {
            echo "## Commits"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since \`$previous_tag\`:"
              echo
              commit_range="$previous_tag..$target_commit"
            else
              echo "Initial release commits:"
              echo
              commit_range="$target_commit"
            fi

            commit_lines="$(git log --pretty=format:'- `%h` %s (%an)' "$commit_range")"
            if [[ -n "$commit_lines" ]]; then
              printf '%s\n' "$commit_lines"
            else
              echo "- No commits found."
            fi
          } > "$notes_file"

          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
          echo "target_commit=$target_commit" >> "$GITHUB_OUTPUT"

      - name: Create or reuse release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_NOTES_FILE: ${{ steps.release-notes.outputs.notes_file }}
          TARGET_COMMIT: ${{ steps.release-notes.outputs.target_commit }}
        with:
          result-encoding: string
          script: |
            const fs = require('node:fs');
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const body = fs.readFileSync(process.env.RELEASE_NOTES_FILE, 'utf8');

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                body,
              });
              core.info(`Using existing release ${existing.data.html_url}`);
              return String(existing.data.id);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const prerelease = /(?:^|[-.])(alpha|beta|rc|preview)(?:[-.]|$)/i.test(tag);
            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              target_commitish: process.env.TARGET_COMMIT,
              draft: false,
              prerelease,
              body,
            });
            core.info(`Created release ${release.data.html_url}`);
            return String(release.data.id);

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-14
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
          - name: Windows x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis,msi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive release version from tag
        id: release-version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not contain a valid SemVer version." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Apply release version to app metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;

          for (const file of ['package.json', 'src-tauri/tauri.conf.json']) {
            const json = JSON.parse(fs.readFileSync(file, 'utf8'));
            json.version = version;
            fs.writeFileSync(file, `${JSON.stringify(json, null, 2)}\n`);
          }
          NODE

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          retryAttempts: 2
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
